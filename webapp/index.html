<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athenæum · Retrieval Index</title>
    <script>
      // Apply the theme before first paint to avoid a flash of the wrong theme.
      // Mirrors the resolution logic in useTheme: saved manual choice wins,
      // otherwise the OS preference. Kept inline + dependency-free on purpose.
      (function () {
        try {
          var saved = localStorage.getItem("athenaeum-theme");
          var theme =
            saved === "dark" || saved === "light"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
